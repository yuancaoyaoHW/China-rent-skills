function esc(value) { return String(value ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c])); }
function buildYearText(item) {
  const info = buildYears[item.community];
  if (!info) return "建成年代待查";
  const suffix = info.confidence === "high" ? "" : "（待核验）";
  return "建成年代 " + info.year + suffix;
}
const searchParams = new URLSearchParams(location.search);
const AMAP_JS_KEY = searchParams.get('key') || localStorage.getItem('amap_js_key') || '';
const AMAP_SECURITY_JS_CODE = searchParams.get('jscode') || localStorage.getItem('amap_security_js_code') || '';
const markerColors = { contact: '#177245', watch: '#2457b8', skip: '#64748b' };
const amenityClassNames = { metro: 'metro-marker', mall: 'mall-marker', market: 'market-marker' };
function setMapStatus(message, type = 'info') {
  const node = document.getElementById('mapStatus');
  node.textContent = message;
  node.style.display = message ? 'block' : 'none';
  node.style.borderColor = type === 'error' ? '#ef4444' : '#f59e0b';
  node.style.color = type === 'error' ? '#991b1b' : '#92400e';
}
function localHttpHint() {
  if (location.protocol !== 'file:') return '';
  return '当前是 file:// 打开，高德 JSAPI 可能因来源为 null 被安全校验拦截。建议在本目录运行 python -m http.server 8766，然后访问 http://127.0.0.1:8766/zhangjiang_shortlist_15km_preview.html。';
}
function markerContent(text, className, bgColor) {
  const style = bgColor ? ' style="background:' + esc(bgColor) + '"' : '';
  return '<div class="marker-label ' + esc(className) + '"' + style + '>' + esc(text) + '</div>';
}
function loadAmap() {
  const protocolHint = localHttpHint();
  if (!AMAP_JS_KEY) {
    const key = prompt('请输入高德 JSAPI Key。Key 只会保存在当前浏览器 localStorage，不会写入 HTML 文件。');
    if (!key) {
      setMapStatus('未提供高德 JSAPI Key，无法加载完整高德地图。可在地址后追加 ?key=你的JSAPIKey 后刷新。' + (protocolHint ? ' ' + protocolHint : ''), 'error');
      return;
    }
    localStorage.setItem('amap_js_key', key.trim());
    const securityCode = prompt('如果你的高德 JSAPI Key 是 2021-12-02 以后申请的，请输入 securityJsCode；没有可以留空。');
    if (securityCode) localStorage.setItem('amap_security_js_code', securityCode.trim());
    location.reload();
    return;
  }
  if (protocolHint) {
    setMapStatus('正在尝试加载高德地图。' + protocolHint, 'info');
  }
  if (AMAP_SECURITY_JS_CODE) {
    window._AMapSecurityConfig = { securityJsCode: AMAP_SECURITY_JS_CODE };
  }
  const script = document.createElement('script');
  script.src = 'https://webapi.amap.com/maps?v=2.0&plugin=AMap.Scale,AMap.ToolBar&key=' + encodeURIComponent(AMAP_JS_KEY);
  script.onload = initAmap;
  script.onerror = () => setMapStatus('高德地图脚本加载失败，请检查 JSAPI Key、securityJsCode、网络或 Key 的域名白名单。' + (protocolHint ? ' ' + protocolHint : ''), 'error');
  document.head.appendChild(script);
}
function initAmap() {
  if (!window.AMap) {
    setMapStatus('高德地图对象未初始化，请检查 JSAPI Key。', 'error');
    return;
  }
  setMapStatus('');
  const amap = new AMap.Map('map', {
    zoom: 12,
    center: [work.lon, work.lat],
    resizeEnable: true,
    viewMode: '2D'
  });
  amap.addControl(new AMap.Scale());
  amap.addControl(new AMap.ToolBar({ position: { right: '16px', top: '16px' } }));
  const infoWindow = new AMap.InfoWindow({ offset: new AMap.Pixel(0, -28) });
  const markers = [];
  const workMarker = new AMap.Marker({
    position: [work.lon, work.lat],
    title: '张江昆仑芯',
    content: markerContent('', 'work-marker', ''),
    anchor: 'center'
  });
  workMarker.setMap(amap);
  markers.push(workMarker);
  const circle = new AMap.Circle({
    center: [work.lon, work.lat],
    radius: 15000,
    strokeColor: '#d97706',
    strokeOpacity: .9,
    strokeWeight: 1,
    strokeStyle: 'dashed',
    fillColor: '#d97706',
    fillOpacity: .05
  });
  circle.setMap(amap);
  listings.forEach(item => {
    const marker = new AMap.Marker({
      position: [item.longitude, item.latitude],
      title: item.title,
      content: markerContent(item.rank, item.action, markerColors[item.action]),
      anchor: 'center'
    });
    marker.on('click', () => {
      infoWindow.setContent(
        '<strong>#' + esc(item.rank) + ' ' + esc(item.title) + '</strong>' +
        '<p>￥' + esc(item.rent) + '/月 · ' + esc(item.layout) + ' · ' + esc(item.area_m2) + '㎡ · ' + esc(buildYearText(item)) + '</p>' +
        '<p>' + esc(item.community) + ' · ' + esc(item.address) + '</p>' +
        '<p>' + esc(item.subway) + '；' + esc(item.market) + '；' + esc(item.mall) + '</p>' +
        '<p>' + esc(item.commute) + '</p>' +
        (item.risks ? '<p>风险：' + esc(item.risks) + '</p>' : '') +
        '<p><a href="' + esc(item.url) + '" target="_blank" rel="noopener noreferrer">打开贝壳房源</a></p>'
      );
      infoWindow.open(amap, marker.getPosition());
    });
    marker.setMap(amap);
    markers.push(marker);
  });
  amenities.forEach(amenity => {
    const amenityMarker = new AMap.Marker({
      position: [amenity.longitude, amenity.latitude],
      title: amenity.community + ' | ' + amenity.name + ' | ' + amenity.distance_m + 'm',
      content: markerContent(amenity.label, 'amenity-marker ' + amenityClassNames[amenity.kind], ''),
      anchor: 'center'
    });
    amenityMarker.on('click', () => {
      infoWindow.setContent(
        '<strong>' + esc(amenity.label) + ' ' + esc(amenity.name) + '</strong>' +
        '<p>关联小区：' + esc(amenity.community) + '</p>' +
        '<p>距离约 ' + esc(amenity.distance_m) + 'm · ' + esc(amenity.address) + '</p>' +
        '<p>来源：高德 POI ' + esc(amenity.source) + '</p>'
      );
      infoWindow.open(amap, amenityMarker.getPosition());
    });
    amenityMarker.setMap(amap);
    markers.push(amenityMarker);
  });
  window.focusMarker = rank => {
    const item = listings.find(x => Number(x.rank) === Number(rank));
    if (!item) return;
    amap.setZoomAndCenter(15, [item.longitude, item.latitude]);
  };
  amap.setFitView(markers, false, [60, 60, 60, 60]);
}

document.getElementById('list').innerHTML = listings.map(item =>
