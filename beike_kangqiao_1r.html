    <style>
        #captcha {
            width: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
        }

         
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);  
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);  
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 9999;
            padding: 16px;  
            overflow-y: auto;  
        }

         
        .modal-overlay.show {
            display: flex;
            opacity: 1;
            visibility: visible;
        }

         
        .modal-box {
            width: 100%;
            max-width: 420px;  
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            transform: translateY(-20px) scale(0.95);  
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow: hidden;
            position: relative;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .modal-overlay.show .modal-box {
            transform: translateY(0) scale(1);
            opacity: 1;
        }

         
        .modal-header {
            padding: 0 10px;  
            background: linear-gradient(135deg, #fef0f0 0%, #fee2e2 100%);
            display: flex;
            align-items: center;
            gap: 10px;
            position: relative;
        }

         
        .error-icon {
            width: 28px;  
            height: 28px;
            background: #f56c6c;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(245, 108, 108, 0.2);
        }

         
        .modal-title {
            font-size: 18px;  
            color: #212529;
            font-weight: 600;
            letter-spacing: 0.1px;
        }

         
        .modal-body {
            padding: 20px;  
            color: #495057;
            font-size: 14px;  
            line-height: 2;  
            white-space: pre-line;
        }

         
        .modal-footer {
            padding: 12px 20px;  
            text-align: right;
            background: #f8f9fa;
            border-top: 1px solid #f1f3f5;
            display: flex;  
            justify-content: flex-end;
            gap: 8px;  
        }

         
        .modal-btn {
            padding: 10px 20px;  
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;  
            font-weight: 500;
            transition: all 0.3s ease;
            letter-spacing: 0.2px;
            min-width: 80px;  
            margin-left: 0;  
        }

         
        .confirm-btn {
            background: linear-gradient(135deg, #f56c6c 0%, #f78989 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 108, 108, 0.2);
        }

        .confirm-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(245, 108, 108, 0.3);
        }

        .confirm-btn:active {
            transform: translateY(0);
            box-shadow: 0 2px 8px rgba(245, 108, 108, 0.2);
        }

         
        .cancel-btn {
            background: #f8f9fa;
            color: #495057;
            border: 1px solid #e9ecef;
        }

        .cancel-btn:hover {
            background: #e9ecef;
            border-color: #dee2e6;
        }
    </style>
